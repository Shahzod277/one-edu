server:
  port: 8084
  ssl:
    enabled: true
    key-alias: selfsigned
    key-store: classpath:keystore.jks
    key-store-type: PKCS12
    key-password: changeit
    key-store-password: changeit

spring:
  application:
    name: one-edu
  datasource:
    url: ${DB_URL:jdbc:postgresql://172.18.10.42:5432/one_edu}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:2030306}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      connection-timeout: 20000
  jpa:
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: update
  servlet:
    multipart:
      max-file-size: 20MB      # bitta fayl uchun maksimal hajm
      max-request-size: 20MB   # butun request hajmi (fayl + form-data)



springdoc:
  swagger-ui:
    path: /docs/swagger-ui.html
  api-docs:
    path: /docs

