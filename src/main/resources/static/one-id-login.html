<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirish</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a237e 0%, #0d47a1 50%, #01579b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 420px;
            max-width: 95vw;
            overflow: hidden;
        }
        .login-header {
            background: linear-gradient(135deg, #1565c0, #0d47a1);
            padding: 32px 40px 28px;
            text-align: center;
        }
        .login-header .logo-text {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px;
        }
        .login-header .logo-sub {
            font-size: 13px;
            color: rgba(255,255,255,0.75);
            margin-top: 6px;
        }
        .login-body {
            padding: 36px 40px 40px;
        }
        .btn-oneid {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #1565c0, #0d47a1);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
        }
        .btn-oneid:hover { opacity: 0.9; }
        .btn-oneid svg {
            width: 24px;
            height: 24px;
            fill: #fff;
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 28px 0;
            color: #90a4ae;
            font-size: 13px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }
        .divider span { padding: 0 16px; }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #37474f;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.2s;
            outline: none;
        }
        .form-group input:focus {
            border-color: #1565c0;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #37474f;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 8px;
        }
        .btn-login:hover { opacity: 0.9; }
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .error-msg {
            background: #ffebee;
            color: #c62828;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .uz-flag {
            display: flex;
            height: 4px;
        }
        .uz-flag span:nth-child(1) { flex: 1; background: #1eb53a; }
        .uz-flag span:nth-child(2) { flex: 1; background: #fff; }
        .uz-flag span:nth-child(3) { flex: 1; background: #0099b5; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="uz-flag"><span></span><span></span><span></span></div>
        <div class="login-header">
            <div class="logo-text">ONE ID</div>
            <div class="logo-sub">Yagona identifikatsiya tizimi</div>
        </div>
        <div class="login-body">
            <div class="error-msg" id="errorMsg"></div>

            <a class="btn-oneid" id="btnOneId" href="#">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                OneID orqali kirish
            </a>

            <div class="divider"><span>yoki</span></div>

            <form id="loginForm">
                <input type="hidden" id="apiKey" value="">
                <div class="form-group">
                    <label>Login</label>
                    <input type="text" id="login" placeholder="Login kiriting" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Parol</label>
                    <input type="password" id="password" placeholder="Parol kiriting" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-login" id="btnLogin">Kirish</button>
            </form>
        </div>
    </div>

    <script>
        (function() {
            var params = new URLSearchParams(window.location.search);
            var apiKey = params.get('apiKey') || '';
            document.getElementById('apiKey').value = apiKey;

            // OneID redirect tugmasi
            document.getElementById('btnOneId').href = '/api/auth/oneid-redirect?apiKey=' + encodeURIComponent(apiKey);

            var errorParam = params.get('error');
            if (errorParam) {
                showError(decodeURIComponent(errorParam));
            }

            // Direct login form
            document.getElementById('loginForm').addEventListener('submit', function(e) {
                e.preventDefault();
                var btn = document.getElementById('btnLogin');
                var login = document.getElementById('login').value.trim();
                var password = document.getElementById('password').value;

                if (!login || !password) {
                    showError('Login va parolni kiriting');
                    return;
                }

                btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span>Tekshirilmoqda...';
                hideError();

                fetch('/api/auth/direct-login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-XSRF-TOKEN': getCsrfToken()
                    },
                    body: JSON.stringify({ login: login, password: password, apiKey: apiKey })
                })
                .then(function(resp) { return resp.json(); })
                .then(function(data) {
                    if (data.redirectUrl) {
                        window.location.href = data.redirectUrl;
                    } else if (data.message) {
                        showError(data.message);
                        resetBtn();
                    } else {
                        showError('Kutilmagan xatolik');
                        resetBtn();
                    }
                })
                .catch(function(err) {
                    showError('Server bilan xatolik: ' + err.message);
                    resetBtn();
                });
            });

            function showError(msg) {
                var el = document.getElementById('errorMsg');
                el.textContent = msg;
                el.style.display = 'block';
            }
            function hideError() { document.getElementById('errorMsg').style.display = 'none'; }
            function getCsrfToken() {
                var match = document.cookie.match('(^|;)\\s*XSRF-TOKEN=([^;]+)');
                return match ? decodeURIComponent(match[2]) : '';
            }
            function resetBtn() {
                var btn = document.getElementById('btnLogin');
                btn.disabled = false;
                btn.innerHTML = 'Kirish';
            }
        })();
    </script>
</body>
</html>
